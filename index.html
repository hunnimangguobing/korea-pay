<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓國代付計算系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">代付價格計算器</h2>
        
        <!-- 匯率參考區 -->
        <div class="mb-6 p-4 bg-blue-50 rounded-lg">
            <div class="flex justify-between items-center">
                <span class="text-sm text-blue-700 font-medium">明洞 MoneyBox (TWD 買入價)</span>
                <span id="moneybox-rate" class="text-lg font-bold text-blue-900">載入中...</span>
            </div>
            <p class="text-xs text-blue-600 mt-1">* 每 10 分鐘自動更新一次</p>
        </div>

        <div class="space-y-4">
            <!-- 輸入項目 -->
            <div>
                <label class="block text-sm font-medium text-gray-700">韓幣總額 (KRW)</label>
                <input type="number" id="krw-amount" placeholder="請輸入韓幣金額" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500" oninput="calculate()">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">代付匯率 (對客人)</label>
                    <input type="number" id="customer-rate" value="40" step="0.1" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" oninput="calculate()">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">換錢匯率 (成本)</label>
                    <input type="number" id="cost-rate" value="41" step="0.1" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 border" oninput="calculate()">
                </div>
            </div>

            <hr class="my-6">

            <!-- 計算結果 -->
            <div class="space-y-3">
                <div class="flex justify-between items-center p-3 bg-gray-100 rounded">
                    <span class="text-gray-600">應收金額 (TWD)</span>
                    <span id="total-receive" class="text-xl font-bold text-red-600">0</span>
                </div>
                <div class="flex justify-between items-center p-3 bg-green-50 rounded">
                    <span class="text-green-700 font-medium">預估利潤 (TWD)</span>
                    <span id="profit" class="text-xl font-bold text-green-600">0</span>
                </div>
            </div>

            <!-- 明細細節 -->
            <div class="text-xs text-gray-500 bg-gray-50 p-3 rounded mt-4">
                <strong>計算明細：</strong>
                <ul class="list-disc ml-4 mt-1">
                    <li>基礎手續費：30元</li>
                    <li id="extra-fee-note">未滿10萬韓幣手續費：50元 (目前：<span id="fee-status">免收</span>)</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // 1. 自動抓取 MoneyBox 匯率 (使用 Proxy 解決跨網域問題)
        async function fetchMoneyBoxRate() {
            try {
                // 使用公共 Proxy 服務抓取網頁內容
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://moneybox-exchange.com/zh-CHT/exchange')}`);
                const data = await response.json();
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                
                // 根據網頁結構尋找 TWD 買入匯率 (此處需根據該網站實體 HTML 定位)
                // 注意：如果網站結構改變，選擇器需要調整
                const rows = doc.querySelectorAll('tr');
                let twdRate = "N/A";
                rows.forEach(row => {
                    if(row.innerText.includes('TWD')) {
                        const cells = row.querySelectorAll('td');
                        // 根據該網頁結構，通常買入價在特定欄位
                        twdRate = cells[2].innerText.trim();
                    }
                });
                
                document.getElementById('moneybox-rate').innerText = twdRate;
            } catch (error) {
                document.getElementById('moneybox-rate').innerText = "連線失敗";
            }
        }

        // 2. 核心計算功能
        function calculate() {
            const krw = parseFloat(document.getElementById('krw-amount').value) || 0;
            const customerRate = parseFloat(document.getElementById('customer-rate').value) || 1;
            const costRate = parseFloat(document.getElementById('cost-rate').value) || 1;

            let baseFee = 30; // 固定手續費
            let lowAmountFee = 0;

            // 判斷是否未滿 10 萬韓幣
            if (krw > 0 && krw < 100000) {
                lowAmountFee = 50;
                document.getElementById('fee-status').innerText = "加收 50 元";
                document.getElementById('fee-status').className = "text-red-500 font-bold";
            } else {
                lowAmountFee = 0;
                document.getElementById('fee-status').innerText = "免收";
                document.getElementById('fee-status').className = "text-green-500";
            }

            // 計算收費：(金額 / 代付匯率) + 30 + (50?)
            const totalReceive = (krw / customerRate) + baseFee + lowAmountFee;

            // 計算利潤：收費 - (金額 / 成本匯率)
            // 注意：手續費通常視為純利潤，或者根據你的成本計算
            const cost = (krw / costRate);
            const profit = totalReceive - cost;

            // 顯示結果 (四捨五入)
            document.getElementById('total-receive').innerText = Math.round(totalReceive).toLocaleString();
            document.getElementById('profit').innerText = Math.round(profit).toLocaleString();
        }

        // 初始化
        fetchMoneyBoxRate();
        // 每 10 分鐘自動更新一次匯率
        setInterval(fetchMoneyBoxRate, 600000);
    </script>
</body>
</html>
