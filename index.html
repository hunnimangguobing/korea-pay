<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>韓國代付計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .toggle-checkbox:checked { right: 0; border-color: #4F46E5; }
        .toggle-checkbox:checked + .toggle-label { background-color: #4F46E5; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-8 px-4 font-sans">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">韓國代付報價系統</h1>
        </div>

        <div class="p-6 space-y-4">
            <!-- 開關區 -->
            <div class="space-y-2">
                <!-- 10萬開關 -->
                <div class="flex items-center justify-between bg-orange-50 p-3 rounded-lg border border-orange-100">
                    <span class="text-sm font-bold text-orange-700">今日累計已滿 10 萬韓幣</span>
                    <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="accumulated-check" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" onchange="calculate()"/>
                        <label for="accumulated-check" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                    </div>
                </div>

                <!-- 代下單開關 -->
                <div class="flex items-center justify-between bg-blue-50 p-3 rounded-lg border border-blue-100">
                    <span class="text-sm font-bold text-blue-700">需代下單(+30元)</span>
                    <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="order-check" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" onchange="calculate()"/>
                        <label for="order-check" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                    </div>
                </div>
            </div>

            <!-- 輸入項目 -->
            <div class="space-y-4 pt-2">
                <div class="bg-indigo-50 p-4 rounded-xl">
                    <label class="block text-sm font-bold text-indigo-700 mb-2">本次代付金額 (KRW)</label>
                    <input type="number" id="krw-amount" placeholder="請輸入韓幣金額" 
                        class="w-full text-2xl font-semibold bg-white border-none rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 shadow-sm"
                        oninput="calculate()">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="p-3 border border-gray-200 rounded-xl">
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">今日代付匯率</label>
                        <input type="number" id="customer-rate-input" value="43.5" step="0.1" class="w-full text-lg font-bold text-indigo-600 focus:outline-none" oninput="calculate()">
                    </div>
                    <div class="p-3 border border-gray-200 rounded-xl bg-gray-50">
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">成本匯率(利潤用)</label>
                        <input type="number" id="cost-rate-input" value="44.2" step="0.1" class="w-full text-lg font-bold text-gray-600 focus:outline-none" oninput="calculate()">
                    </div>
                </div>
            </div>

            <hr class="border-gray-100">

            <!-- 結果顯示區 -->
            <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100">
                <div class="flex justify-between items-start">
                    <span class="text-gray-500 font-medium">應收總額 (TWD)</span>
                    <div class="text-right">
                        <div class="text-3xl font-black text-red-500">$ <span id="total-receive">0</span></div>
                        <div id="profit-tag" class="text-xs text-emerald-600 font-bold mt-1">利潤: $0</div>
                    </div>
                </div>
                
                <button onclick="copyToClipboard()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition shadow-lg active:transform active:scale-95 flex items-center justify-center gap-2">
                    📋 一鍵複製報價公式
                </button>
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-black text-white px-6 py-2 rounded-full text-sm opacity-0 transition-opacity duration-300 pointer-events-none">已複製報價公式</div>

    <script>
        function calculate() {
            const krw = parseFloat(document.getElementById('krw-amount').value) || 0;
            const cRate = parseFloat(document.getElementById('customer-rate-input').value) || 1;
            const costRate = parseFloat(document.getElementById('cost-rate-input').value) || 1;
            
            const isAccumulated = document.getElementById('accumulated-check').checked;
            const isOrder = document.getElementById('order-check').checked;

            let lowAmountFee = 0;
            let orderFee = 0;

            // 判斷 50 元 (未滿十萬)
            if (!isAccumulated && krw > 0 && krw < 100000) {
                lowAmountFee = 50;
            }

            // 判斷 30 元 (代下單)
            if (isOrder) {
                orderFee = 30;
            }

            const convertedAmount = Math.round(krw / cRate);
            const totalReceive = krw > 0 ? (convertedAmount + orderFee + lowAmountFee) : 0;
            const cost = krw > 0 ? Math.round(krw / costRate) : 0;
            const profit = totalReceive > 0 ? (totalReceive - cost) : 0;

            document.getElementById('total-receive').innerText = totalReceive.toLocaleString();
            document.getElementById('profit-tag').innerText = `利潤: $${profit.toLocaleString()}`;

            return {
                krw, cRate, convertedAmount, lowAmountFee, orderFee, totalReceive, isAccumulated, isOrder
            };
        }

        function copyToClipboard() {
            const res = calculate();
            if (res.krw <= 0) {
                alert("請先輸入金額");
                return;
            }

            let message = `${res.krw} / ${res.cRate} = ${res.convertedAmount}\n`;
            
            // 如果開關打開才顯示代下單
            if (res.isOrder) {
                message += `+代付手續費30元\n`;
            }
            
            // 如果符合條件才顯示 50 元
            if (!res.isAccumulated && res.krw < 100000) {
                message += `+單日未滿10萬手續費50元\n`;
            }
            
            message += `\n💰${res.totalReceive}元`;

            const tempArea = document.createElement('textarea');
            tempArea.value = message;
            document.body.appendChild(tempArea);
            tempArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempArea);

            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }
    </script>
</body>
</html>
